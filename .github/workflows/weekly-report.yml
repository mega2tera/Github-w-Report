name: Weekly GitHub Report

on:
  schedule:
    # GitHub cron 使用 UTC：周六 01:17 = 北京时间周六 09:17
    - cron: "17 1 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Generate weekly report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4.1-mini' }}
        run: python run.py --no-push

      - name: Save report history to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "report: publish weekly digest $(date -u +%F)"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Push to WeCom after deployment
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python run.py --push-existing
