name: Weekly GitHub Report

on:
  schedule:
    # GitHub cron 使用 UTC：周六 01:17 = 北京时间周六 09:17
    - cron: "17 1 * * 6"
  workflow_dispatch:
    inputs:
      push_only:
        description: "仅推送最新一期到企业微信（不调用模型）"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Generate weekly report
        if: ${{ !inputs.push_only }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4.1-mini' }}
        run: python run.py --no-push

      - name: Save report history to repository
        if: ${{ !inputs.push_only }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "report: publish weekly digest $(date -u +%F)"
            git push
          fi

      - name: Configure GitHub Pages
        if: ${{ !inputs.push_only }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ !inputs.push_only }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        if: ${{ !inputs.push_only }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Push to WeCom after deployment
        if: ${{ !inputs.push_only }}
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python run.py --push-existing

      - name: Test WeCom with latest report
        if: ${{ inputs.push_only }}
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python run.py --push-latest
